services:
  # In production, we use a stronger password from .env
  db:
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    restart: always
    # Persistence enabled for production safety
    command: redis-server --appendonly yes

  api:
    restart: always
    environment:
      # Production settings
      IB_HOST: 172.17.0.1  # Docker bridge gateway to reach host
      IB_PORT: ${IB_PORT:-4001}
      # API Key must be set in .env
      QUIVER_API_KEY: ${QUIVER_API_KEY}
      ENABLE_LIVE_TRADING: ${ENABLE_LIVE_TRADING:-false}
      # Use production-grade WSgi server (gunicorn) via uvicorn workers if desired, 
      # but standard uvicorn is fine for this scale
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    restart: always
    environment:
      IB_HOST: 172.17.0.1
    extra_hosts:
      - "host.docker.internal:host-gateway"

  beat:
    restart: always
    environment:
      IB_HOST: 172.17.0.1
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    restart: always
    environment:
      NODE_ENV: production

  nginx:
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
