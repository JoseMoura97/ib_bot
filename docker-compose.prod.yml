services:
  # In production, we use a stronger password from .env
  db:
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    restart: always
    # Persistence enabled for production safety
    command: redis-server --appendonly yes

  api:
    restart: always
    environment:
      IB_HOST: 172.17.0.1
      IB_PORT: ${IB_PORT:-4001}
      QUIVER_API_KEY: ${QUIVER_API_KEY}
      ENABLE_LIVE_TRADING: ${ENABLE_LIVE_TRADING:-false}
      LIVE_DRY_RUN: ${LIVE_DRY_RUN:-true}
      LIVE_MAX_ORDER_PCT_NLV: ${LIVE_MAX_ORDER_PCT_NLV:-0.30}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      API_KEY: ${API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    restart: always
    environment:
      IB_HOST: 172.17.0.1
      LIVE_DRY_RUN: ${LIVE_DRY_RUN:-true}
      LIVE_MAX_ORDER_PCT_NLV: ${LIVE_MAX_ORDER_PCT_NLV:-0.30}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  beat:
    restart: always
    environment:
      IB_HOST: 172.17.0.1
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    restart: always
    environment:
      NODE_ENV: production
      INTERNAL_API_KEY: ${API_KEY:-}

  nginx:
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /etc/ssl/ibbot:/etc/ssl/ibbot:ro
