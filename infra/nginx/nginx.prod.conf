server {
    listen 80;
    server_name _;  # Catch-all, or put your domain here
    
    # Redirect HTTP to HTTPS
    # location / {
    #     return 301 https://$host$request_uri;
    # }
    
    # For now (setup phase), allow HTTP until Certbot is run
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $api_upstream api;
        rewrite ^/api/?(.*)$ /$1 break;
        proxy_pass http://$api_upstream:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $web_upstream web;
        proxy_pass http://$web_upstream:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

