services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ibbot
      POSTGRES_PASSWORD: ibbot
      POSTGRES_DB: ibbot
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://ibbot:ibbot@db:5432/ibbot
      REDIS_URL: redis://redis:6379/0
      # Optional (set in your environment / VM):
      QUIVER_API_KEY: ${QUIVER_API_KEY-}
      IB_HOST: ${IB_HOST-127.0.0.1}
      IB_PORT: ${IB_PORT-4001}
      PRICE_SOURCE: ${PRICE_SOURCE-auto}
    depends_on:
      - db
      - redis
    volumes:
      - ./.cache:/app/.cache
    ports:
      - "8000:8000"

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://ibbot:ibbot@db:5432/ibbot
      REDIS_URL: redis://redis:6379/0
      QUIVER_API_KEY: ${QUIVER_API_KEY-}
      IB_HOST: ${IB_HOST-127.0.0.1}
      IB_PORT: ${IB_PORT-4001}
      PRICE_SOURCE: ${PRICE_SOURCE-auto}
    depends_on:
      - db
      - redis
    volumes:
      - ./.cache:/app/.cache

  beat:
    build:
      context: .
      dockerfile: worker/Dockerfile
    command: ["celery", "-A", "app.worker.celery_app", "beat", "--loglevel=INFO"]
    environment:
      DATABASE_URL: postgresql+psycopg://ibbot:ibbot@db:5432/ibbot
      REDIS_URL: redis://redis:6379/0
      QUIVER_API_KEY: ${QUIVER_API_KEY-}
      IB_HOST: ${IB_HOST-127.0.0.1}
      IB_PORT: ${IB_PORT-4001}
      PRICE_SOURCE: ${PRICE_SOURCE-auto}
    depends_on:
      - db
      - redis
    volumes:
      - ./.cache:/app/.cache

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE: /api
      # Used by Next.js server-side rendering inside the container.
      INTERNAL_API_BASE: http://api:8000
    depends_on:
      - api
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.27
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
    ports:
      - "8080:80"

volumes:
  pgdata:
