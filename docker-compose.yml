services:
  db:
    restart: unless-stopped
    image: postgres:16
    environment:
      POSTGRES_USER: ibbot
      POSTGRES_PASSWORD: ibbot
      POSTGRES_DB: ibbot
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    restart: unless-stopped
    image: redis:7

  api:
    restart: unless-stopped
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://ibbot:ibbot@db:5432/ibbot
      REDIS_URL: redis://redis:6379/0
      # Optional (set in your environment / VM):
      QUIVER_API_KEY: ${QUIVER_API_KEY-}
      # 13F replication defaults (production-safe / no-lookahead)
      USE_13F_FILED_DATES: "1"
      SEC_13F_OPTIONS_MODE: filter
      # If IB Gateway/TWS runs on the host, Docker Desktop can reach it via host.docker.internal
      IB_HOST: ${IB_HOST-host.docker.internal}
      IB_PORT: ${IB_PORT-4001}
      # Default to IB for pricing in the stack (no Yahoo fallback unless you set PRICE_SOURCE=auto/yfinance).
      PRICE_SOURCE: ${PRICE_SOURCE-ib}
      # Prefer split-adjusted bars from IB for backtests
      IB_WHAT_TO_SHOW: ${IB_WHAT_TO_SHOW-ADJUSTED_LAST}
      LIVE_FRACTIONAL_SHARES: ${LIVE_FRACTIONAL_SHARES-false}
      LIVE_FRACTIONAL_DECIMALS: ${LIVE_FRACTIONAL_DECIMALS-4}
      LIVE_MIN_LEG_USD: ${LIVE_MIN_LEG_USD-1.0}
    depends_on:
      - db
      - redis
    volumes:
      - ./.cache:/app/.cache
    # Linux Docker has no built-in host.docker.internal; map it to the host gateway
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8001:8000"

  worker:
    restart: unless-stopped
    build:
      context: .
      dockerfile: worker/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://ibbot:ibbot@db:5432/ibbot
      REDIS_URL: redis://redis:6379/0
      QUIVER_API_KEY: ${QUIVER_API_KEY-}
      # 13F replication defaults (production-safe / no-lookahead)
      USE_13F_FILED_DATES: "1"
      SEC_13F_OPTIONS_MODE: filter
      IB_HOST: ${IB_HOST-host.docker.internal}
      IB_PORT: ${IB_PORT-4001}
      PRICE_SOURCE: ${PRICE_SOURCE-ib}
      IB_WHAT_TO_SHOW: ${IB_WHAT_TO_SHOW-ADJUSTED_LAST}
      LIVE_FRACTIONAL_SHARES: ${LIVE_FRACTIONAL_SHARES-false}
      LIVE_FRACTIONAL_DECIMALS: ${LIVE_FRACTIONAL_DECIMALS-4}
      LIVE_MIN_LEG_USD: ${LIVE_MIN_LEG_USD-1.0}
    depends_on:
      - db
      - redis
    volumes:
      - ./.cache:/app/.cache
    extra_hosts:
      - "host.docker.internal:host-gateway"

  beat:
    restart: unless-stopped
    build:
      context: .
      dockerfile: worker/Dockerfile
    command: ["celery", "-A", "app.worker.celery_app", "beat", "--loglevel=INFO"]
    environment:
      DATABASE_URL: postgresql+psycopg://ibbot:ibbot@db:5432/ibbot
      REDIS_URL: redis://redis:6379/0
      QUIVER_API_KEY: ${QUIVER_API_KEY-}
      # 13F replication defaults (production-safe / no-lookahead)
      USE_13F_FILED_DATES: "1"
      SEC_13F_OPTIONS_MODE: filter
      IB_HOST: ${IB_HOST-host.docker.internal}
      IB_PORT: ${IB_PORT-4001}
      PRICE_SOURCE: ${PRICE_SOURCE-ib}
      IB_WHAT_TO_SHOW: ${IB_WHAT_TO_SHOW-ADJUSTED_LAST}
      LIVE_FRACTIONAL_SHARES: ${LIVE_FRACTIONAL_SHARES-false}
      LIVE_FRACTIONAL_DECIMALS: ${LIVE_FRACTIONAL_DECIMALS-4}
      LIVE_MIN_LEG_USD: ${LIVE_MIN_LEG_USD-1.0}
    depends_on:
      - db
      - redis
    volumes:
      - ./.cache:/app/.cache
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    restart: unless-stopped
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE: /api
      INTERNAL_API_BASE: http://api:8000
      INTERNAL_API_KEY: ${API_KEY-}
    depends_on:
      - api

  web-lint:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: lint
    environment:
      NEXT_PUBLIC_API_BASE: /api

  nginx:
    restart: unless-stopped
    image: nginx:1.27
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
    ports:
      - "8090:80"

volumes:
  pgdata:
